<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sari-Sari Smart - Add Specific Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- HEADER -->
      <header class="app-header">
        <a class="header-btn" id="btnBackSales" href="sales.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 class="header-title" data-i18n="addSpecificSale">Add Specific Sale</h1>
        <span style="width:36px;"></span>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div style="padding:16px;">
          <div class="form-group">
            <label for="specificItemDesc" data-i18n="itemDesc">Item Description</label>
            <input type="text" id="specificItemDesc" class="form-input" placeholder="e.g. 1 sack of rice">
          </div>
          <div class="form-group">
            <label for="specificAmount" data-i18n="saleAmount">Amount (₱)</label>
            <input type="number" id="specificAmount" class="form-input" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label for="specificCustomer" data-i18n="customerOptional">Customer (optional)</label>
            <input type="text" id="specificCustomer" class="form-input" placeholder="Enter customer name for utang">
          </div>
          <div style="padding:12px 16px;background:var(--primary-bg);border-radius:var(--radius);margin-bottom:16px;">
            <span style="color:var(--text-secondary);font-size:var(--text-sm,13px);">If you enter a customer name, this will also be recorded as a debt in the Utang screen.</span>
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="sales.html" data-i18n="cancel">Cancel</a>
            <button class="btn btn-primary" id="btnSaveSpecific" data-i18n="saveSpecificSale">Save Sale</button>
          </div>
        </div>
      </main>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>

    </div>
    <div class="phone-home-bar"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
