<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart - Utang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">
      <!-- HEADER -->
      <header class="app-header" style="background:var(--primary);color:white;">
        <a class="header-btn" href="morning.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 style="font-size:17px;font-weight:700;flex:1;text-align:center;" data-i18n="debtsTitle">Utang</h1>
        <div class="header-actions">
          <button class="header-btn header-tutorial-btn" id="headerTutorialBtn" onclick="startTutorial('debts', true)" aria-label="Tutorial" style="color:white;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
          <a class="header-btn" href="setting.html" style="text-decoration:none;color:white;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </a>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div class="debt-summary-card" style="margin-bottom:12px;">
          <span class="debt-summary-label" data-i18n="debtsTotalLabel">Kabuuang Utang</span>
          <span class="debt-summary-amount" id="manageTotalDebt">₱0.00</span>
        </div>
        <a class="btn btn-primary btn-large" href="new_debt.html" style="margin-bottom:12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="newDebtBtn">Bagong Utang</span>
        </a>
        <div class="list-container" id="manageDebtsList"></div>
      </main>

      <!-- PAYMENT BOTTOM SHEET -->
      <div class="bottom-sheet-overlay" id="paymentSheetOverlay" onclick="closePaymentSheet()">
        <div class="bottom-sheet" id="paymentSheet" onclick="event.stopPropagation()">
          <div class="sheet-handle"></div>
          <div class="sheet-header">
            <h2 class="sheet-title" data-i18n="payTitle">Magbayad</h2>
          </div>
          <div class="sheet-body">
            <div class="payment-customer-info" id="paymentCustomerInfo">
              <div class="payment-customer-name" id="paymentCustomerName"></div>
              <div class="payment-customer-balance" id="paymentCustomerBalance">Balanse: ₱0.00</div>
            </div>
            <div class="form-group">
              <label data-i18n="payLabel">Magkano ang ibabayad?</label>
              <input type="number" id="paymentAmount" class="form-input" placeholder="0.00" min="0.01" step="0.01" oninput="updatePaymentPreview()">
            </div>
            <div class="payment-preview">
              <span data-i18n="payPreview">Matitira pagkatapos:</span>
              <span class="payment-preview-amount" id="paymentRemaining">₱0.00</span>
            </div>
            <div class="sheet-actions">
              <button class="btn btn-secondary" onclick="closePaymentSheet()" data-i18n="cancel">Kanselahin</button>
              <button class="btn btn-primary" onclick="savePayment()" data-i18n="payBtn">Bayad Na ✓</button>
            </div>
          </div>
        </div>
      </div>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav" id="bottomNav">
        <a class="nav-item" href="morning.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
          <span class="nav-label" data-i18n="navMorning">Umaga</span>
        </a>
        <a class="nav-item" href="inventory.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span class="nav-label" data-i18n="stocksLink">Stock</span>
        </a>
        <a class="nav-item active" href="debts.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/></svg>
          <span class="nav-label" data-i18n="debtsLink">Utang</span>
        </a>
      </nav>

      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>

  <!-- TUTORIAL OVERLAY (outside phone-frame for correct position:fixed behavior) -->
  <div id="tutorialRoot">
    <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
      <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
      <div class="tutorial-highlight" id="tutorialHighlight"></div>
      <div class="tutorial-box" id="tutorialBox">
        <div class="tutorial-step-indicator">
          <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
        </div>
        <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
        <div class="tutorial-actions">
          <button class="btn btn-secondary btn-sm" id="tutorialSkip" onclick="endTutorial()" data-i18n="skip" style="display:none;">Skip</button>
          <button class="btn btn-primary btn-sm" id="tutorialNext" onclick="advanceTutorial()" data-i18n="next">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
