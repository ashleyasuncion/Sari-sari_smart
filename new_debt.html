<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart - Bagong Utang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">
      <!-- HEADER -->
      <header class="app-header" style="background:var(--primary);color:white;">
        <a class="header-btn" href="debts.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 style="font-size:var(--text-xl);font-weight:700;flex:1;text-align:center;">Bagong Utang</h1>
        <span style="width:36px;"></span>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div class="form-group">
          <label>Pangalan ng Kostumer</label>
          <input type="text" id="newDebtCustomer" class="form-input" placeholder="Ilagay ang pangalan">
        </div>
        <div class="form-group">
          <label>Halaga ng Utang (₱)</label>
          <input type="number" id="newDebtAmount" class="form-input" placeholder="0.00" min="0.01" step="0.01">
        </div>
        <button class="btn btn-primary btn-full" onclick="saveNewDebt()">I-save ang Utang</button>
      </main>

      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
