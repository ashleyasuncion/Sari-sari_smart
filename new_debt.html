<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sari-Sari Smart - New Debt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- HEADER -->
      <header class="app-header">
        <a class="header-btn" id="btnNewDebtCancel" href="debts.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 class="header-title" data-i18n="newDebtManual">New Debt</h1>
        <a class="header-btn" id="settingsBtn" href="setting.html" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </a>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div style="padding:16px;">
          <div class="form-group">
            <label for="newDebtCustomerName" data-i18n="customerName">Customer Name</label>
            <input type="text" id="newDebtCustomerName" class="form-input" placeholder="Enter customer name" data-i18n-placeholder="enterCustomerNameDebt">
          </div>
          <div class="form-group">
            <label for="newDebtAmount" data-i18n="debtAmount">Debt Amount (₱)</label>
            <input type="number" id="newDebtAmount" class="form-input" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div style="padding:12px 16px;background:var(--primary-bg);border-radius:var(--radius);margin-bottom:16px;">
            <span style="color:var(--text-secondary);font-size:var(--text-sm,13px);" data-i18n="debtNote">This will add the amount to the customer's outstanding balance. You can record payments from the Debts screen.</span>
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="debts.html" data-i18n="cancel">Cancel</a>
            <button class="btn btn-primary" id="btnSaveDebt" data-i18n="saveDebt">Save Debt</button>
          </div>
        </div>
      </main>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>

    </div>
    <div class="phone-home-bar"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
