<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart - Umaga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- HEADER -->
      <header class="app-header">
        <div class="header-left">
          <span class="header-greeting" id="headerGreeting">Magandang araw! 👋</span>
        </div>
        <div class="header-actions">
          <button class="header-btn header-tutorial-btn" id="headerTutorialBtn" onclick="startTutorial('morning', true)" aria-label="Tutorial">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
          <a class="header-btn" id="manageStoreBtn" aria-label="Manage Store" href="inventory.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </a>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="app-content" id="appContent">

        <!-- MORNING CHECK -->
        <div class="moment-screen">
          <div class="morning-header">
            <div class="morning-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </div>
            <div class="morning-greeting" id="morningGreeting">Magandang umaga!</div>
            <div class="morning-subtitle" id="morningSubtitle" data-i18n="morningSubtitle">Handa na ba ang tindahan ngayong araw?</div>
          </div>

          <div class="morning-cards">
            <!-- Stock warnings -->
            <div class="morning-card">
              <div class="morning-card-icon warning-bg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="morning-card-body">
                <div class="morning-card-title" id="morningStockTitle">✅ Lahat ng stock — okay</div>
                <div class="morning-card-desc" id="morningStockDesc">No items running low</div>
              </div>
            </div>

            <!-- Debt summary -->
            <div class="morning-card">
              <div class="morning-card-icon debt-bg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 12h.01"/></svg>
              </div>
              <div class="morning-card-body">
                <div class="morning-card-title" id="morningDebtTitle">💰 Utang: ₱0.00</div>
                <div class="morning-card-desc" id="morningDebtDesc">0 customers</div>
              </div>
            </div>

            <!-- Yesterday summary -->
            <div class="morning-card" id="morningYesterdayCard" style="display:none;">
              <div class="morning-card-icon summary-bg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div class="morning-card-body">
                <div class="morning-card-title" id="morningYesterdayTitle">Kahapon: ₱0.00</div>
                <div class="morning-card-desc" id="morningYesterdayDesc">Yesterday's earnings</div>
              </div>
            </div>
          </div>

          <button class="btn btn-primary btn-large morning-start-btn" id="btnStartDay" onclick="startDay()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-i18n="startDay">Simulan ang Araw</span>
          </button>
        </div>
      </main>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav">
        <a class="nav-item active" id="navMorning" href="morning.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
          <span class="nav-label" data-i18n="navMorning">Umaga</span>
        </a>
        <div class="nav-spacer"></div>
        <a class="nav-item nav-fab-item" href="day.html">
          <div class="nav-fab">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          <span class="nav-label" data-i18n="navSale">Benta</span>
        </a>
        <div class="nav-spacer"></div>
        <a class="nav-item" id="navClose" href="closing.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span class="nav-label" data-i18n="navClose">Isara</span>
        </a>
      </nav>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>

  <!-- TUTORIAL OVERLAY (outside phone-frame for correct position:fixed behavior) -->
  <div id="tutorialRoot">
    <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
      <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
      <div class="tutorial-highlight" id="tutorialHighlight"></div>
      <div class="tutorial-box" id="tutorialBox">
        <div class="tutorial-step-indicator">
          <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
        </div>
        <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
        <div class="tutorial-actions">
          <button class="btn btn-secondary btn-sm" id="tutorialSkip" onclick="endTutorial()" data-i18n="skip" style="display:none;">Skip</button>
          <button class="btn btn-primary btn-sm" id="tutorialNext" onclick="advanceTutorial()" data-i18n="next">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
