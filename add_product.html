<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart - Add Stock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">
      <!-- HEADER -->
      <header class="app-header" style="background:var(--primary);color:white;">
        <a class="header-btn" href="inventory.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 style="font-size:17px;font-weight:700;flex:1;text-align:center;" id="addProductTitle" data-i18n="addProductTitle">Magdagdag ng Stock</h1>
        <div class="header-actions">
          <button class="header-btn header-tutorial-btn" id="headerTutorialBtn" onclick="startTutorial('add_product', true)" aria-label="Tutorial">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div class="form-group">
          <label for="productName" data-i18n="productNameLabel">Pangalan ng Produkto</label>
          <input type="text" id="productName" class="form-input" data-i18n-placeholder="productName" placeholder="e.g. Canned Tuna">
        </div>
        <div class="form-group">
          <label for="productQty" data-i18n="productQtyLabel">Dami</label>
          <input type="number" id="productQty" class="form-input" placeholder="10" min="1" step="1">
        </div>
        <div class="form-group">
          <label for="productCost" data-i18n="costLabel">Presyo ng Stock (₱)</label>
          <input type="number" id="productCost" class="form-input" placeholder="0.00" min="0" step="0.01">
        </div>

        <!-- Markup Helper -->
        <div class="markup-helper" id="markupSuggestion" style="display:none;">
          <div class="hint" id="markupHint">Sa 20% markup, ibenta sa</div>
          <div class="suggested" id="markupSuggestedPrice">₱0.00</div>
          <div class="hint"><span data-i18n="suggestedPrice">Suggested</span></div>
        </div>

        <div class="form-group">
          <label for="productMarkup" data-i18n="markupLabel">Markup (%)</label>
          <input type="number" id="productMarkup" class="form-input" placeholder="20" min="0" max="1000" step="1">
          <div class="markup-hint" id="productMarkupHint"></div>
        </div>
        <div class="form-group">
          <label for="productPrice" data-i18n="priceLabel">Presyo ng Benta (₱)</label>
          <input type="number" id="productPrice" class="form-input" placeholder="0.00" min="0" step="0.01">
        </div>
        <input type="hidden" id="editProductId">
        <button class="btn btn-primary btn-full" onclick="saveProduct()" data-i18n="saveBtn">I-save</button>
      </main>

      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>

  <!-- TUTORIAL OVERLAY (outside phone-frame for correct position:fixed behavior) -->
  <div id="tutorialRoot">
    <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
      <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
      <div class="tutorial-highlight" id="tutorialHighlight"></div>
      <div class="tutorial-box" id="tutorialBox">
        <div class="tutorial-step-indicator">
          <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
        </div>
        <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
        <div class="tutorial-actions">
          <button class="btn btn-secondary btn-sm" id="tutorialSkip" onclick="endTutorial()" data-i18n="skip" style="display:none;">Skip</button>
          <button class="btn btn-primary btn-sm" id="tutorialNext" onclick="advanceTutorial()" data-i18n="next">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
