<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sari-Sari Smart - Add Stock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- HEADER -->
      <header class="app-header">
        <a class="header-btn" id="btnCancelStock" href="inventory.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 class="header-title" id="stockPageTitle" data-i18n="addStockTitle">Add Stock</h1>
        <span style="width:36px;"></span>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <input type="hidden" id="editStockIdHidden" value="">
        <div style="padding:16px;">
          <div class="form-group">
            <label for="stockItemName" data-i18n="itemName">Item Name</label>
            <input type="text" id="stockItemName" class="form-input" placeholder="e.g. Canned Tuna">
          </div>
          <div class="form-group">
            <label for="stockQty" data-i18n="quantity">Quantity</label>
            <input type="number" id="stockQty" class="form-input" placeholder="0" min="0" step="1">
          </div>
          <div class="form-group">
            <label for="stockCostPrice" data-i18n="costPerUnit">Cost per Unit (₱)</label>
            <input type="number" id="stockCostPrice" class="form-input" placeholder="0.00" min="0" step="0.01">
          </div>

          <!-- Markup Helper -->
          <div class="markup-helper" id="markupSuggestion" style="display:none;">
            <div class="hint" id="markupHint" data-i18n="markupHint">At 20% markup, sell this at</div>
            <div class="suggested" id="markupSuggestedPrice">₱0.00</div>
            <div class="hint"><span data-i18n="suggestedPrice">Suggested</span></div>
          </div>

          <div class="form-group">
            <label for="stockMarkup" data-i18n="markupPercent">Markup (%)</label>
            <input type="number" id="stockMarkup" class="form-input" placeholder="20" min="0" max="200" step="1" value="20">
          </div>
          <div class="form-group">
            <label for="stockSellPrice" data-i18n="sellPrice">Selling Price (₱)</label>
            <input type="number" id="stockSellPrice" class="form-input" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" id="btnCancelStock" href="inventory.html" data-i18n="cancel">Cancel</a>
            <button class="btn btn-primary" id="btnSaveStock" data-i18n="save">Save</button>
          </div>
        </div>
      </main>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>

    </div>
    <div class="phone-home-bar"></div>
  </div>

  <!-- TUTORIAL OVERLAY (outside phone-frame for correct position:fixed behavior) -->
  <div id="tutorialRoot">
    <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
      <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
      <div class="tutorial-highlight" id="tutorialHighlight"></div>
      <div class="tutorial-box" id="tutorialBox">
        <div class="tutorial-step-indicator">
          <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
        </div>
        <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
        <div class="tutorial-actions">
          <button class="btn btn-secondary btn-sm" id="tutorialSkip" data-i18n="skip" style="display:none;">Skip</button>
          <button class="btn btn-primary btn-sm" id="tutorialNext" data-i18n="next">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
