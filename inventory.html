<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sari-Sari Smart - Stocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- HEADER -->
      <header class="app-header">
        <h1 class="header-title" id="headerTitle">Stocks</h1>
        <a class="header-btn" id="settingsBtn" href="setting.html" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </a>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="stockSearch" placeholder="Search items..." data-i18n-placeholder="searchProducts">
        </div>

        <a class="btn btn-primary btn-large" id="btnAddStock" href="add_product.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="addStock">Add Stock</span>
        </a>

        <!-- Kulang Na Section -->
        <div id="kulangNaSection" style="display:none;">
          <div class="section-label" data-i18n="kulangNa">Running Low</div>
          <div class="list-container" id="kulangNaList"></div>
        </div>

        <!-- All Items -->
        <div class="section-label" id="allItemsLabel" data-i18n="allItems">All Items</div>
        <div class="list-container" id="allStocksList">
          <div class="empty-state" data-i18n="noStockItems">No stock items yet. Add your first item!</div>
        </div>
      </main>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav" id="bottomNav">
        <a class="nav-item" data-page="home" data-i18n-label="home" href="home.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span class="nav-label" data-i18n="home">Home</span>
        </a>
        <a class="nav-item active" data-page="inventory" data-i18n-label="stocks" href="inventory.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span class="nav-label" data-i18n="stocks">Stocks</span>
        </a>
        <a class="nav-item" data-page="sales" data-i18n-label="sales" href="sales.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span class="nav-label" data-i18n="sales">Sales</span>
        </a>
        <a class="nav-item" data-page="debts" data-i18n-label="utang" href="debts.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 12h.01"/></svg>
          <span class="nav-label" data-i18n="utang">Utang</span>
        </a>
        <a class="nav-item" data-page="help" data-i18n-label="help" href="help.html">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span class="nav-label" data-i18n="help">Help</span>
        </a>
      </nav>

      <!-- STOCK DETAIL OVERLAY -->
      <div class="overlay" id="stockDetailOverlay">
        <div class="overlay-content overlay-full">
          <div class="overlay-header">
            <button class="btn-icon" id="btnStockDetailBack">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2 id="stockDetailName">Item</h2>
          </div>
          <div class="overlay-scroll">
            <div class="product-detail-section">
              <div class="product-detail-row">
                <span class="product-detail-label" data-i18n="currentStock">Current Stock</span>
                <span class="product-detail-value" id="stockDetailQty">0</span>
              </div>
              <div class="product-detail-row">
                <span class="product-detail-label" data-i18n="costPrice">Cost Price</span>
                <span class="product-detail-value" id="stockDetailCost">₱0.00</span>
              </div>
              <div class="product-detail-row">
                <span class="product-detail-label" data-i18n="sellingPrice">Selling Price</span>
                <span class="product-detail-value" id="stockDetailPrice">₱0.00</span>
              </div>

            </div>

            <div class="section-label" data-i18n="updateStatus">Status</div>
            <div class="status-options" id="stockStatusOptions">
              <button class="status-chip" data-status="plenty">
                <span class="dot green"></span>
                <span data-i18n="maramiPa">Marami Pa</span>
              </button>
              <button class="status-chip" data-status="low">
                <span class="dot orange"></span>
                <span data-i18n="medyoKulang">Medyo Kulang</span>
              </button>
              <button class="status-chip" data-status="out">
                <span class="dot red"></span>
                <span data-i18n="walaNa">Wala Na</span>
              </button>
            </div>

            <div class="section-label" data-i18n="deductStock">Sold</div>
            <div class="form-group">
              <label for="stockDeductQty" data-i18n="deductQty">Quantity sold</label>
              <input type="number" id="stockDeductQty" class="form-input" value="1" min="1" step="1">
            </div>
            <button class="btn btn-primary btn-full" id="btnConfirmDeduct">
              <span data-i18n="deductStock">Confirm Sold</span>
            </button>

            <a class="btn btn-secondary btn-full" href="add_product.html?edit=" id="stockDetailEditLink" style="margin-top:8px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              <span data-i18n="edit">Edit</span>
            </a>
          </div>
        </div>
      </div>

      <!-- TUTORIAL OVERLAY -->
      <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
        <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
        <div class="tutorial-highlight" id="tutorialHighlight"></div>
        <div class="tutorial-box" id="tutorialBox">
          <div class="tutorial-step-indicator">
            <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
          </div>
          <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
          <div class="tutorial-actions">
            <button class="btn btn-secondary btn-sm" id="tutorialSkip" data-i18n="skip" style="display:none;">Skip</button>
            <button class="btn btn-primary btn-sm" id="tutorialNext" data-i18n="next">Next</button>
          </div>
        </div>
      </div>

      <!-- CONFIRMATION MODAL -->
      <div class="overlay" id="confirmOverlay">
        <div class="overlay-content overlay-xs">
          <div class="confirm-icon" id="confirmIcon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <h3 class="confirm-title" id="confirmTitle">Are you sure?</h3>
          <p class="confirm-message" id="confirmMessage">This action cannot be undone.</p>
          <div class="confirm-actions">
            <button class="btn btn-secondary" id="confirmNo" data-i18n="cancel">Cancel</button>
            <button class="btn btn-primary" id="confirmYes" data-i18n="confirm">Confirm</button>
          </div>
        </div>
      </div>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>

    </div>
    <div class="phone-home-bar"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
