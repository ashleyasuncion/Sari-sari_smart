<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">
      <!-- HEADER -->
      <header class="app-header" style="background:var(--primary);color:white;">
        <a class="header-btn" href="morning.html" style="text-decoration:none;color:white;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <h1 style="font-size:17px;font-weight:700;flex:1;text-align:center;" data-i18n="settingsTitle">Settings</h1>
        <div class="header-actions">
          <button class="header-btn header-tutorial-btn" id="headerTutorialBtn" onclick="startTutorial('setting', true)" aria-label="Tutorial" style="color:white;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="app-content" id="appContent">
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settingsLanguage">Wika</div>
          <select id="settingsLanguage" class="form-input" onchange="saveSettings()">
            <option value="en">English</option>
            <option value="fil">Filipino</option>
          </select>
        </div>
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="textSize">Text Size</div>
          <div class="text-size-options">
            <button class="text-size-btn active" data-size="standard" onclick="setTextSize('standard')" data-i18n="standard">Standard</button>
            <button class="text-size-btn" data-size="large" onclick="setTextSize('large')" data-i18n="large">Large</button>
            <button class="text-size-btn" data-size="extra-large" onclick="setTextSize('extra-large')" data-i18n="extraLarge">Extra Large</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settingsStore">Pangalan ng Tindahan</div>
          <input type="text" id="settingsStoreName" class="form-input" onchange="saveSettings()">
        </div>
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settingsOwner">Pangalan ng May-ari</div>
          <input type="text" id="settingsOwnerName" class="form-input" onchange="saveSettings()">
        </div>
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="dataMgmt">Data Management</div>
          <button class="btn btn-secondary btn-full" onclick="resetData()" style="margin-bottom:8px;">
            <span data-i18n="resetDataBtn">I-reset ang Data</span>
          </button>
          <button class="btn btn-secondary btn-full" onclick="exportData()">
            <span data-i18n="exportDataBtn">I-export ang Data</span>
          </button>
        </div>
      </main>

      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>

  <!-- TUTORIAL OVERLAY (outside phone-frame for correct position:fixed behavior) -->
  <div id="tutorialRoot">
    <div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
      <div class="tutorial-backdrop" id="tutorialBackdrop"></div>
      <div class="tutorial-highlight" id="tutorialHighlight"></div>
      <div class="tutorial-box" id="tutorialBox">
        <div class="tutorial-step-indicator">
          <span id="tutorialCurrent">1</span>/<span id="tutorialTotal">8</span>
        </div>
        <div class="tutorial-text" id="tutorialText">Welcome to Sari-Sari Smart!</div>
        <div class="tutorial-actions">
          <button class="btn btn-secondary btn-sm" id="tutorialSkip" onclick="endTutorial()" data-i18n="skip" style="display:none;">Skip</button>
          <button class="btn btn-primary btn-sm" id="tutorialNext" onclick="advanceTutorial()" data-i18n="next">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
