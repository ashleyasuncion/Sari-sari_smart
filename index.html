<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sari-Sari Smart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-container" id="app">

      <!-- SETUP OVERLAY (first-time onboarding) -->
      <div class="overlay" id="setupOverlay">
        <div class="overlay-content overlay-sm" style="justify-content:center;height:100%;padding:24px;">
          <div style="text-align:center;margin-bottom:24px;">
            <div class="splash-icon" style="margin-bottom:12px;">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <h2 style="font-size:var(--text-2xl);margin-bottom:4px;">Welcome sa Sari-Sari Smart!</h2>
            <p style="color:var(--text-secondary);">I-set up ang iyong tindahan</p>
          </div>
          <div class="form-group">
            <label>Pangalan ng Tindahan</label>
            <input type="text" id="setupStoreName" class="form-input" placeholder="Hal. Tindahan ni Maria">
          </div>
          <div class="form-group">
            <label>Pangalan ng May-ari</label>
            <input type="text" id="setupOwnerName" class="form-input" placeholder="Hal. Maria Santos">
          </div>
          <div class="form-group">
            <label>Wika</label>
            <select id="setupLanguage" class="form-input">
              <option value="fil">Filipino</option>
              <option value="en">English</option>
            </select>
          </div>
          <button class="btn btn-primary btn-full" onclick="completeSetup()">Magsimula na!</button>
        </div>
      </div>

      <!-- TOAST -->
      <div class="toast-container" id="toastContainer"></div>
    </div>
    <div class="phone-home-bar"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
